<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Play & Sip Something New</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: #111;
            margin: 0;
            touch-action: none;
        }

        /* Main Game Container */
        .ad-container {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #006241 0%, #1e3932 100%);
            overflow: hidden;
            color: white;
            display: flex;
            flex-direction: column;
        }

        /* Subtle Background Pattern */
        .ad-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                radial-gradient(circle at 100% 150%, #006241 24%, white 24%, white 25%, #006241 25%, #006241 36%, white 36%, white 37%, transparent 37%, transparent),
                radial-gradient(circle at 0 150%, #006241 24%, white 24%, white 25%, #006241 25%, #006241 36%, white 36%, white 37%, transparent 37%, transparent);
            background-size: 100px 100px;
            opacity: 0.05;
            pointer-events: none;
            z-index: 0;
        }

        .score-pill {
            position: absolute;
            top: clamp(60px, 15vmin, 90px);
            right: clamp(10px, 4vmin, 20px);
            z-index: 20;
            font-size: clamp(11px, 3.5vmin, 14px);
            font-weight: 700;
            background: rgba(0,0,0,0.4);
            padding: clamp(4px, 1.5vmin, 6px) clamp(8px, 3vmin, 12px);
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: clamp(4px, 1.5vmin, 6px);
            opacity: 1;
            transition: opacity 0.5s;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 10;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Game Screen */
        #screen-game {
            z-index: 5;
        }

        /* Tilt Hint */
        .tilt-hint {
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.6);
            padding: clamp(8px, 3vmin, 12px) clamp(14px, 5vmin, 20px);
            border-radius: 25px;
            font-size: clamp(11px, 3.5vmin, 14px);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: clamp(6px, 2.5vmin, 10px);
            white-space: nowrap;
            opacity: 1;
            transition: opacity 1s ease;
            pointer-events: none;
            z-index: 8;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Player Frappuccino Cup */
        .player-cup {
            position: absolute;
            bottom: clamp(15px, 4vh, 40px);
            left: 0;
            font-size: clamp(45px, 16vmin, 80px);
            line-height: 1;
            z-index: 10;
            will-change: transform;
            transition: transform 150ms ease-out;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
        }

        /* Falling Items */
        .falling-item {
            position: absolute;
            top: 0;
            font-size: clamp(28px, 10vmin, 50px);
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
            z-index: 6;
            will-change: transform;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* +1 Float Text */
        .float-text {
            position: absolute;
            font-size: clamp(18px, 6vmin, 26px);
            font-weight: 900;
            color: #ffc107;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 11;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.3); opacity: 0; }
        }

        /* Result Screens (Win/Lose) */
        .overlay-screen {
            background: rgba(0, 50, 32, 0.55);
            justify-content: center;
            align-items: center;
            padding: clamp(12px, 5vmin, 20px);
            z-index: 30;
        }

        .result-heading {
            font-size: clamp(16px, 5vmin, 22px);
            font-weight: 900;
            color: #ffc107;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: clamp(12px, 4vmin, 20px);
        }

        .result-card {
            background: #f4f4f4;
            color: #333;
            width: 90%;
            max-width: 340px;
            border-radius: 20px;
            padding: clamp(20px, 6vmin, 32px) clamp(14px, 5vmin, 20px) clamp(24px, 8vmin, 40px);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: clamp(20px, 6vmin, 32px);
        }

        .result-image {
            font-size: clamp(80px, 28vmin, 140px);
            margin-bottom: clamp(4px, 2vmin, 10px);
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            line-height: 1.1;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .result-title {
            font-size: clamp(22px, 7vmin, 32px);
            font-weight: 900;
            color: #222;
            margin-bottom: clamp(6px, 2vmin, 10px);
        }

        .result-desc {
            font-size: clamp(13px, 4vmin, 16px);
            color: #555;
            line-height: 1.5;
            font-weight: 600;
        }

        .cta-btn {
            background: #FFFFFF;
            border: 1px solid rgba(0, 0, 0, 0.15);
            height: 48px;
            padding: 0 12px 0 11px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 600;
            font-family: -apple-system, 'SF Pro Text', 'Montserrat', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #000000;
            transition: all 0.2s;
            margin-bottom: clamp(12px, 3.5vmin, 18px);
            box-shadow: 0px 2px 12px rgba(0, 0, 0, 0.13);
            max-width: 70%;
            box-sizing: border-box;
        }

        .cta-btn svg {
            flex-shrink: 0;
        }

        .cta-btn:active {
            background: #EEEEEE;
        }

        .play-again-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            padding: clamp(8px, 2.5vmin, 12px) clamp(18px, 5.5vmin, 26px);
            border-radius: 25px;
            font-size: clamp(12px, 3.5vmin, 15px);
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: clamp(5px, 1.5vmin, 7px);
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.2s;
        }

        .play-again-btn:active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .lose-heading {
            color: #ff6b6b;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="ad-container" id="game-container">

    <!-- Score Pill -->
    <div class="score-pill" id="score-pill">
        <span style="color: #ffc107;">⭐</span> <span id="score-text">0/6</span>
    </div>

    <!-- Game Screen -->
    <div id="screen-game" class="screen active">
        <div class="tilt-hint" id="tilt-hint">📱 Tilt your phone to catch treats!</div>
        <div class="player-cup" id="player">🥤</div>
    </div>

    <!-- Win Screen -->
    <div id="screen-win" class="screen overlay-screen">
        <div class="result-heading">YOU WON!</div>
        <div class="result-card">
            <div class="result-image">🎉</div>
            <h2 class="result-title">FREE Drink!</h2>
            <p class="result-desc">You've unlocked a<br>FREE Starbucks drink!</p>
        </div>
        <button class="cta-btn" onclick="handleCTA()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0FADFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg> Redeem Free Drink</button>
        <button class="play-again-btn" onclick="resetGame()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg> Play Again</button>
    </div>

    <!-- Lose Screen (Caught Bomb) -->
    <div id="screen-lose" class="screen overlay-screen">
        <div class="result-heading lose-heading">BOOM!</div>
        <div class="result-card">
            <div class="result-image">💥</div>
            <h2 class="result-title">Oh No!</h2>
            <p class="result-desc">You caught a bomb!<br>Avoid the bombs next time.</p>
        </div>
        <button class="play-again-btn" onclick="resetGame()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg> Try Again</button>
    </div>

</div>

<script>
    // Game Configuration
    const TARGET_SCORE = 6;
    const GOOD_ITEMS = ['🍩', '☕', '⭐', '🎁', '🧁', '🍪'];
    const BAD_ITEMS = ['💣'];

    // State
    let score = 0;
    let isPlaying = false;
    let gameLoop;
    let spawnInterval;
    let activeItems = [];

    // DOM Elements
    const container = document.getElementById('game-container');
    const player = document.getElementById('player');
    const screenGame = document.getElementById('screen-game');
    const screenWin = document.getElementById('screen-win');
    const screenLose = document.getElementById('screen-lose');
    const scoreText = document.getElementById('score-text');
    const tiltHint = document.getElementById('tilt-hint');

    // Player Configuration
    let playerX = container.clientWidth / 2;
    let targetX = playerX;
    let smoothedTilt = 0;
    let _deviceGamma = null;
    const TILT_CLAMP = 0.5;
    const TILT_SMOOTHING = 0.08;

    function getPlayerWidth() {
        return Math.max(45, container.clientWidth * 0.15);
    }
    function getHeightScale() {
        return container.clientHeight / 750;
    }

    player.style.transform = `translateX(${playerX}px) translateX(-50%)`;

    function beginCountdown() {
        setTimeout(() => {
            setupControls();
            startGame();

            setTimeout(() => {
                tiltHint.style.opacity = '0';
            }, 3500);
        }, 1200);
    }

    // MRAID Integration
    let hasStarted = false;

    function tryStart() {
        if (hasStarted) return;
        hasStarted = true;
        beginCountdown();
    }

    function onViewable(viewable) {
        if (viewable) {
            if (!hasStarted) {
                tryStart();
            } else {
                resumeGame();
            }
        } else {
            pauseGame();
        }
    }

    if (typeof mraid !== 'undefined') {
        mraid.addEventListener('viewableChange', onViewable);

        if (mraid.getState() !== 'loading' && mraid.isViewable()) {
            tryStart();
        }

        mraid.addEventListener('ready', function () {
            if (mraid.isViewable()) {
                tryStart();
            }
        });
    } else {
        window.onload = () => {
            setTimeout(beginCountdown, 2500);
        };
    }

    function startGame() {
        score = 0;
        updateScoreUI();
        isPlaying = true;

        // Clear old items from logic and DOM
        activeItems.forEach(item => item.el.remove());
        activeItems = [];

        // Game loops
        spawnInterval = setInterval(spawnItem, 800);
        gameLoop = requestAnimationFrame(update);
    }

    function spawnItem() {
        if (!isPlaying) return;

        // 25% chance for a bomb
        const isBad = Math.random() > 0.75;
        const charSet = isBad ? BAD_ITEMS : GOOD_ITEMS;
        const emoji = charSet[Math.floor(Math.random() * charSet.length)];

        // Create element
        const itemEl = document.createElement('div');
        itemEl.classList.add('falling-item');
        itemEl.innerText = emoji;

        // Random X position ensuring it stays within container bounds
        const itemWidth = Math.max(28, container.clientWidth * 0.1);
        const startX = Math.random() * (container.clientWidth - itemWidth);
        itemEl.style.left = `${startX}px`;
        itemEl.style.transform = `translateY(-50px)`;

        screenGame.appendChild(itemEl);

        // Track state fully inside JS to avoid DOM lookup errors
        activeItems.push({
            el: itemEl,
            y: -50,
            x: startX,
            speed: (3.5 + Math.random() * 2.5) * getHeightScale(),
            type: isBad ? 'bad' : 'good'      // Perfectly decoupled from DOM
        });
    }

    function update() {
        if (!isPlaying || isPaused) return;

        let rawTilt = null;
        const accel = window._nativeAccel;
        if (accel && typeof accel.x === 'number') {
            rawTilt = Math.max(-1, Math.min(1, accel.x / TILT_CLAMP));
        } else if (_deviceGamma !== null) {
            rawTilt = Math.max(-1, Math.min(1, _deviceGamma / 30));
        }
        if (rawTilt !== null) {
            smoothedTilt += (rawTilt - smoothedTilt) * TILT_SMOOTHING;
            const cw = container.clientWidth;
            const pw = getPlayerWidth();
            let newX = (cw / 2) + smoothedTilt * (cw / 2);
            targetX = Math.max(pw / 2, Math.min(cw - pw / 2, newX));
        }

        player.style.transform = `translateX(${Math.round(targetX)}px) translateX(-50%)`;

        const playerRect = player.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();

        // Loop backwards so we can safely splice items from the array
        for (let i = activeItems.length - 1; i >= 0; i--) {
            let item = activeItems[i];

            // Move item down
            item.y += item.speed;
            item.el.style.transform = `translateY(${item.y}px)`;

            const itemRect = item.el.getBoundingClientRect();

            // AABB Collision Detection
            // Added padding so you have to actually hit the cup part, not just the bounding box edge
            const collisionPaddingX = Math.max(8, container.clientWidth * 0.04);
            const collisionPaddingY = Math.max(10, container.clientHeight * 0.03);

            if (
                itemRect.left < (playerRect.right - collisionPaddingX) &&
                itemRect.right > (playerRect.left + collisionPaddingX) &&
                itemRect.bottom > (playerRect.top + collisionPaddingY) &&
                itemRect.top < playerRect.bottom
            ) {
                // Catch Logic
                handleCatch(item, i);
                continue;
            }

            // Missed item (fell past screen)
            if (item.y > containerRect.height) {
                item.el.remove();
                activeItems.splice(i, 1);
            }
        }

        // Loop execution
        if (isPlaying) {
            gameLoop = requestAnimationFrame(update);
        }
    }

    function handleCatch(item, index) {
        // Read the type safely from our JS object
        if (item.type === 'good') {
            score++;
            showFloatText('+1', item.x, player.offsetTop - container.clientHeight * 0.05);
            updateScoreUI();

            // Clean up item
            item.el.remove();
            activeItems.splice(index, 1);

            // Win Condition
            if (score >= TARGET_SCORE) {
                triggerWin();
            }
        } else if (item.type === 'bad') {
            // Bomb caught -> Instant Lose
            triggerLose();
        }
    }

    function showFloatText(text, x, y) {
        const floatEl = document.createElement('div');
        floatEl.classList.add('float-text');
        floatEl.innerText = text;
        floatEl.style.left = `${x}px`;
        floatEl.style.top = `${y}px`;
        screenGame.appendChild(floatEl);

        setTimeout(() => {
            floatEl.remove();
        }, 800);
    }

    function updateScoreUI() {
        scoreText.innerText = `${score}/${TARGET_SCORE}`;
    }

    let isPaused = false;

    function pauseGame() {
        if (!isPlaying || isPaused) return;
        isPaused = true;
        cancelAnimationFrame(gameLoop);
        clearInterval(spawnInterval);
    }

    function resumeGame() {
        if (!isPlaying || !isPaused) return;
        isPaused = false;
        spawnInterval = setInterval(spawnItem, 800);
        gameLoop = requestAnimationFrame(update);
    }

    function stopEngine() {
        isPlaying = false;
        isPaused = false;
        cancelAnimationFrame(gameLoop);
        clearInterval(spawnInterval);
    }

    function triggerWin() {
        stopEngine();
        setTimeout(() => {
            screenWin.classList.add('active');
        }, 300);
    }

    function triggerLose() {
        stopEngine();
        // Slight delay gives visual impact of catching it
        setTimeout(() => {
            screenLose.classList.add('active');
        }, 100);
    }

    function resetGame() {
        screenWin.classList.remove('active');
        screenLose.classList.remove('active');

        // Show tilt hint again briefly
        tiltHint.style.opacity = '1';
        setTimeout(() => {
            tiltHint.style.opacity = '0';
        }, 3000);

        startGame();
    }

    // --- INPUT CONTROLS --- //
    function handleCTA() {
        var url = 'https://www.example.com/redeem?offer=free-drink';
        if (typeof mraid !== 'undefined') {
            mraid.open(url);
        } else {
            window.open(url, '_blank');
        }
    }

    function setupControls() {
        const updatePlayerX = (clientX) => {
            const containerRect = container.getBoundingClientRect();
            const pw = getPlayerWidth();
            let x = clientX - containerRect.left;

            if (x < pw / 2) x = pw / 2;
            if (x > containerRect.width - pw / 2) x = containerRect.width - pw / 2;

            targetX = x;
            playerX = x;
        };

        // Touch & Drag Controls
        container.addEventListener('touchmove', (e) => {
            if(!isPlaying) return;
            e.preventDefault();
            updatePlayerX(e.touches[0].clientX);
        }, { passive: false });

        let isMouseDown = false;
        container.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            updatePlayerX(e.clientX);
        });
        window.addEventListener('mouseup', () => {
            isMouseDown = false;
        });
        container.addEventListener('mousemove', (e) => {
            if (isMouseDown && isPlaying) updatePlayerX(e.clientX);
        });

        window.addEventListener('deviceorientation', (e) => {
            if (e.gamma !== null) _deviceGamma = e.gamma;
        });
    }
</script>

</body>
</html>
