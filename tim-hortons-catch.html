<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catch Treats, Win Rewards</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: #222;
            margin: 0;
            touch-action: none;
        }

        /* Main Game Container */
        .ad-container {
            position: fixed;
            inset: 0;
            background: #d81a2a;
            overflow: hidden;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .score-pill {
            position: absolute;
            top: clamp(60px, 15vmin, 90px);
            right: clamp(10px, 4vmin, 20px);
            z-index: 20;
            font-size: clamp(11px, 3.5vmin, 14px);
            font-weight: 700;
            background: rgba(0,0,0,0.4);
            padding: clamp(4px, 1.5vmin, 6px) clamp(8px, 3vmin, 12px);
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: clamp(4px, 1.5vmin, 6px);
            opacity: 0;
            transition: opacity 0.5s;
            color: white;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 10;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Start Screen */
        #screen-start {
            background: radial-gradient(circle at center, #5a000a 0%, #2a0003 100%);
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 15;
        }

        .start-logo {
            width: clamp(60px, 20vmin, 100px);
            height: clamp(60px, 20vmin, 100px);
            background: white;
            color: #d81a2a;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: clamp(16px, 5.5vmin, 26px);
            text-align: center;
            line-height: 1;
            margin-bottom: clamp(8px, 3vmin, 15px);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .start-title {
            font-size: clamp(20px, 6vmin, 28px);
            font-weight: 900;
            margin-bottom: clamp(3px, 1vmin, 5px);
        }

        .start-subtitle {
            font-size: clamp(14px, 4.5vmin, 18px);
            font-weight: 700;
            margin-bottom: clamp(10px, 4vmin, 20px);
        }

        .start-loading {
            font-size: clamp(11px, 3.5vmin, 14px);
            color: rgba(255,255,255,0.6);
            margin-bottom: clamp(20px, 8vmin, 40px);
        }

        .start-box {
            font-size: clamp(45px, 15vmin, 80px);
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Game Screen */
        #screen-game {
            background: radial-gradient(circle at center, #e32636 0%, #a6101e 100%);
            z-index: 5;
        }

        /* Tilt Hint */
        .tilt-hint {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.6);
            padding: clamp(8px, 3vmin, 12px) clamp(14px, 5vmin, 20px);
            border-radius: 25px;
            font-size: clamp(11px, 3.5vmin, 14px);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: clamp(6px, 2.5vmin, 10px);
            white-space: nowrap;
            opacity: 1;
            transition: opacity 1s ease;
            pointer-events: none;
            z-index: 8;
        }

        /* Player Box */
        .player-box {
            position: absolute;
            bottom: clamp(15px, 4vh, 40px);
            left: 0;
            width: clamp(60px, 20vw, 100px);
            height: clamp(38px, 7vh, 60px);
            background: #a90011;
            border: 2px solid #ff4d5a;
            border-top: none;
            border-radius: 0 0 10px 10px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 5px;
            font-size: 26px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3), inset 0 -10px 15px rgba(0,0,0,0.2);
            z-index: 10;
            will-change: transform;
            transition: transform 150ms ease-out;
        }

        .player-box::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -2px;
            right: -2px;
            height: 10px;
            border: 2px solid #ff4d5a;
            border-bottom: none;
            border-radius: 5px 5px 0 0;
            background: rgba(0,0,0,0.2);
        }

        /* Falling Items */
        .falling-item {
            position: absolute;
            top: 0;
            font-size: clamp(25px, 9vmin, 45px);
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
            z-index: 6;
            will-change: transform;
        }

        /* +1 / -1 Float Text */
        .float-text {
            position: absolute;
            font-size: clamp(18px, 6vmin, 28px);
            font-weight: 900;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 11;
            animation: floatUp 0.8s ease-out forwards;
        }

        .float-text.negative {
            color: #ffcccc;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.2); opacity: 0; }
        }

        /* Result Screen */
        #screen-result {
            background: rgba(90, 0, 10, 0.55);
            justify-content: center;
            align-items: center;
            padding: clamp(12px, 5vmin, 20px);
            z-index: 30;
        }

        .result-heading {
            font-size: clamp(16px, 5vmin, 22px);
            font-weight: 900;
            color: #ffc107;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: clamp(12px, 4vmin, 20px);
        }

        .result-card {
            background: white;
            color: #333;
            width: 90%;
            max-width: 340px;
            border-radius: 20px;
            padding: clamp(20px, 6vmin, 32px) clamp(14px, 5vmin, 20px) clamp(24px, 8vmin, 40px);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: clamp(20px, 6vmin, 32px);
        }

        .result-image {
            font-size: clamp(80px, 28vmin, 140px);
            margin-bottom: clamp(4px, 2vmin, 10px);
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            line-height: 1.1;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .result-title {
            font-size: clamp(22px, 7vmin, 32px);
            font-weight: 900;
            color: #222;
            margin-bottom: clamp(6px, 2vmin, 10px);
        }

        .result-desc {
            font-size: clamp(13px, 4vmin, 16px);
            color: #555;
            line-height: 1.5;
            font-weight: 600;
        }

        .cta-btn {
            background: #FFFFFF;
            border: 1px solid rgba(0, 0, 0, 0.15);
            height: 48px;
            padding: 0 12px 0 11px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 600;
            font-family: -apple-system, 'SF Pro Text', 'Montserrat', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #000000;
            transition: all 0.2s;
            margin-bottom: clamp(12px, 3.5vmin, 18px);
            box-shadow: 0px 2px 12px rgba(0, 0, 0, 0.13);
            max-width: 70%;
            box-sizing: border-box;
        }

        .cta-btn svg {
            flex-shrink: 0;
        }

        .cta-btn:active {
            background: #EEEEEE;
        }

        .play-again-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            padding: clamp(8px, 2.5vmin, 12px) clamp(18px, 5.5vmin, 26px);
            border-radius: 25px;
            font-size: clamp(12px, 3.5vmin, 15px);
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: clamp(5px, 1.5vmin, 7px);
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.2s;
        }

        .play-again-btn:active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="ad-container" id="game-container">

    <!-- Score Pill -->
    <div class="score-pill" id="score-pill">
        <span id="score-text">⭐ 0/6</span>
    </div>

    <!-- Start Screen -->
    <div id="screen-start" class="screen active">
        <div class="start-logo">Tim<br>Hortons</div>
        <h2 class="start-title">Tim Hortons</h2>
        <p class="start-subtitle">Play & save $5</p>
        <p class="start-loading">Get ready to play...</p>
        <div class="start-box">🍩</div>
    </div>

    <!-- Game Screen -->
    <div id="screen-game" class="screen">
        <div class="tilt-hint" id="tilt-hint">📱 Tilt your phone to catch treats!</div>
        <div class="player-box" id="player">🍩</div>
    </div>

    <!-- Result Screen -->
    <div id="screen-result" class="screen">
        <div class="result-heading">YOU WON!</div>
        <div class="result-card">
            <div class="result-image">🍩</div>
            <h2 class="result-title">FREE Donut!</h2>
            <p class="result-desc">You've unlocked<br>$5 off your next Tim Hortons order!</p>
        </div>
        <button class="cta-btn" onclick="handleCTA()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0FADFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg> Redeem $5 Off</button>
        <button class="play-again-btn" onclick="resetGame()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg> Play Again</button>
    </div>

</div>

<script>
    // Game Configuration
    const TARGET_SCORE = 6;
    const GOOD_ITEMS = ['🍩', '☕', '⭐', '🎁', '🧁', '🥯'];
    const BAD_ITEMS = ['💣'];

    // State
    let score = 0;
    let isPlaying = false;
    let gameLoop;
    let spawnInterval;
    let activeItems = [];

    // DOM Elements
    const container = document.getElementById('game-container');
    const player = document.getElementById('player');
    const screenStart = document.getElementById('screen-start');
    const screenGame = document.getElementById('screen-game');
    const screenResult = document.getElementById('screen-result');
    const scorePill = document.getElementById('score-pill');
    const scoreText = document.getElementById('score-text');
    const tiltHint = document.getElementById('tilt-hint');

    // Player position setup
    let playerX = container.clientWidth / 2;
    let targetX = playerX;
    let smoothedTilt = 0;
    let _deviceGamma = null;
    const TILT_CLAMP = 0.5;
    const TILT_SMOOTHING = 0.08;

    function getPlayerWidth() {
        return Math.max(60, container.clientWidth * 0.2);
    }
    function getHeightScale() {
        return container.clientHeight / 750;
    }

    player.style.transform = `translateX(${playerX}px) translateX(-50%)`;

    function beginCountdown() {
        setTimeout(() => {
            screenStart.classList.remove('active');
            screenGame.classList.add('active');
            scorePill.style.opacity = '1';

            setTimeout(() => {
                startGame();
                setTimeout(() => {
                    tiltHint.style.opacity = '0';
                }, 3000);
            }, 500);
        }, 1200);
    }

    // MRAID Integration
    let hasStarted = false;

    function tryStart() {
        if (hasStarted) return;
        hasStarted = true;
        beginCountdown();
    }

    function onViewable(viewable) {
        if (viewable) {
            if (!hasStarted) {
                tryStart();
            } else {
                resumeGame();
            }
        } else {
            pauseGame();
        }
    }

    if (typeof mraid !== 'undefined') {
        mraid.addEventListener('viewableChange', onViewable);

        if (mraid.getState() !== 'loading' && mraid.isViewable()) {
            tryStart();
        }

        mraid.addEventListener('ready', function () {
            if (mraid.isViewable()) {
                tryStart();
            }
        });
    } else {
        window.onload = () => {
            setTimeout(beginCountdown, 2500);
        };
    }

    function startGame() {
        score = 0;
        updateScoreUI();
        isPlaying = true;
        activeItems = [];

        // Clear previous items if any
        document.querySelectorAll('.falling-item').forEach(el => el.remove());

        // Controls
        setupControls();

        // Game loops
        spawnInterval = setInterval(spawnItem, 700);
        gameLoop = requestAnimationFrame(update);
    }

    function spawnItem() {
        if (!isPlaying) return;

        const isBad = Math.random() > 0.8; // 20% chance for a bomb
        const charSet = isBad ? BAD_ITEMS : GOOD_ITEMS;
        const emoji = charSet[Math.floor(Math.random() * charSet.length)];

        const itemEl = document.createElement('div');
        itemEl.classList.add('falling-item');
        itemEl.innerText = emoji;
        itemEl.dataset.type = isBad ? 'bad' : 'good';

        // Random X position ensuring it stays within bounds
        const startX = Math.random() * (container.clientWidth - Math.max(28, container.clientWidth * 0.1));
        itemEl.style.left = `${startX}px`;
        itemEl.style.transform = `translateY(-50px)`;

        screenGame.appendChild(itemEl);

        activeItems.push({
            el: itemEl,
            y: -50,
            x: startX,
            speed: (3 + Math.random() * 2) * getHeightScale()
        });
    }

    function update() {
        if (!isPlaying || isPaused) return;

        let rawTilt = null;
        const accel = window._nativeAccel;
        if (accel && typeof accel.x === 'number') {
            rawTilt = Math.max(-1, Math.min(1, accel.x / TILT_CLAMP));
        } else if (_deviceGamma !== null) {
            rawTilt = Math.max(-1, Math.min(1, _deviceGamma / 30));
        }
        if (rawTilt !== null) {
            smoothedTilt += (rawTilt - smoothedTilt) * TILT_SMOOTHING;
            const cw = container.clientWidth;
            const pw = getPlayerWidth();
            let newX = (cw / 2) + smoothedTilt * (cw / 2);
            targetX = Math.max(pw / 2, Math.min(cw - pw / 2, newX));
        }

        player.style.transform = `translateX(${Math.round(targetX)}px) translateX(-50%)`;

        const playerRect = player.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();

        // Iterate backwards to safely remove items from the array while looping
        for (let i = activeItems.length - 1; i >= 0; i--) {
            let item = activeItems[i];
            item.y += item.speed;
            item.el.style.transform = `translateY(${item.y}px)`;

            // Check collision using bounding rects relative to viewport
            const itemRect = item.el.getBoundingClientRect();

            // Basic AABB (Axis-Aligned Bounding Box) Collision Detection
            if (
                itemRect.left < playerRect.right &&
                itemRect.right > playerRect.left &&
                itemRect.bottom > playerRect.top + 10 && // Give a bit of buffer at the top
                itemRect.top < playerRect.bottom
            ) {
                // Caught!
                handleCatch(item, i);
                continue;
            }

            // Missed (fell off screen)
            if (item.y > containerRect.height) {
                item.el.remove();
                activeItems.splice(i, 1);
            }
        }

        // Keep updating until game is over
        gameLoop = requestAnimationFrame(update);
    }

    function handleCatch(item, index) {
        // FIXED: Checked `item.el.dataset.type` instead of `item.dataset.type`
        if (item.el.dataset.type === 'good') {
            score++;
            showFloatText('+1', item.x, player.offsetTop - container.clientHeight * 0.05, false);
        } else {
            // Caught a bomb
            score = Math.max(0, score - 1);
            showFloatText('-1', item.x, player.offsetTop - container.clientHeight * 0.05, true);
        }

        updateScoreUI();

        // Remove item from DOM and Active Array
        item.el.remove();
        activeItems.splice(index, 1);

        // Check Win
        if (score >= TARGET_SCORE) {
            triggerWin();
        }
    }

    function showFloatText(text, x, y, isNegative) {
        const floatEl = document.createElement('div');
        floatEl.classList.add('float-text');
        if (isNegative) floatEl.classList.add('negative');
        floatEl.innerText = text;
        floatEl.style.left = `${x + 10}px`;
        floatEl.style.top = `${y}px`;
        screenGame.appendChild(floatEl);

        setTimeout(() => {
            floatEl.remove();
        }, 800);
    }

    function updateScoreUI() {
        scoreText.innerText = `⭐ ${score}/${TARGET_SCORE}`;
    }

    let isPaused = false;

    function pauseGame() {
        if (!isPlaying || isPaused) return;
        isPaused = true;
        cancelAnimationFrame(gameLoop);
        clearInterval(spawnInterval);
    }

    function resumeGame() {
        if (!isPlaying || !isPaused) return;
        isPaused = false;
        spawnInterval = setInterval(spawnItem, 700);
        gameLoop = requestAnimationFrame(update);
    }

    function stopEngine() {
        isPlaying = false;
        isPaused = false;
        cancelAnimationFrame(gameLoop);
        clearInterval(spawnInterval);
    }

    function triggerWin() {
        stopEngine();

        setTimeout(() => {
            screenGame.classList.remove('active');
            scorePill.classList.add('hidden');
            screenResult.classList.add('active');
        }, 500);
    }

    function resetGame() {
        screenResult.classList.remove('active');
        scorePill.classList.remove('hidden');
        screenGame.classList.add('active');
        tiltHint.style.opacity = '1';

        setTimeout(() => {
            tiltHint.style.opacity = '0';
        }, 3000);

        startGame();
    }

    // --- INPUT CONTROLS ---
    function handleCTA() {
        var url = 'https://www.example.com/redeem?offer=5off';
        if (typeof mraid !== 'undefined') {
            mraid.open(url);
        } else {
            window.open(url, '_blank');
        }
    }

    function setupControls() {
        const updatePlayerX = (clientX) => {
            const containerRect = container.getBoundingClientRect();
            const pw = getPlayerWidth();
            let x = clientX - containerRect.left;

            if (x < pw / 2) x = pw / 2;
            if (x > containerRect.width - pw / 2) x = containerRect.width - pw / 2;

            targetX = x;
            playerX = x;
        };

        // Touch Events
        container.addEventListener('touchmove', (e) => {
            if(!isPlaying) return;
            e.preventDefault(); // Prevent scrolling
            updatePlayerX(e.touches[0].clientX);
        }, { passive: false });

        // Mouse Events
        let isMouseDown = false;
        container.addEventListener('mousedown', (e) => { isMouseDown = true; updatePlayerX(e.clientX); });
        window.addEventListener('mouseup', () => { isMouseDown = false; });
        container.addEventListener('mousemove', (e) => {
            if (isMouseDown && isPlaying) updatePlayerX(e.clientX);
        });

        window.addEventListener('deviceorientation', (e) => {
            if (e.gamma !== null) _deviceGamma = e.gamma;
        });
    }
</script>

</body>
</html>
