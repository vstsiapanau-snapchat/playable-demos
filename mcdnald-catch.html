<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>McDonald's - Catch Treats</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: #111;
            margin: 0;
            touch-action: none;
        }

        /* Main Game Container */
        .ad-container {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top right, #da291c 0%, #9e0b0f 50%, #5a0002 100%);
            overflow: hidden;
            color: white;
            display: flex;
            flex-direction: column;
        }

        /* Subtle Background Pattern */
        .ad-container::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image:
                radial-gradient(circle at center, rgba(255,255,255,0.04) 0%, transparent 50%),
                repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(255,255,255,0.02) 30px, rgba(255,255,255,0.02) 60px);
            pointer-events: none;
            z-index: 0;
            animation: bgDrift 40s linear infinite;
        }

        @keyframes bgDrift {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50px); }
        }

        .score-pill {
            position: absolute;
            top: clamp(60px, 15vmin, 90px);
            right: clamp(10px, 4vmin, 20px);
            z-index: 20;
            font-size: clamp(11px, 3.5vmin, 14px);
            font-weight: 700;
            background: rgba(0,0,0,0.5);
            padding: clamp(4px, 1.5vmin, 6px) clamp(8px, 3vmin, 12px);
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: clamp(4px, 1.5vmin, 6px);
            opacity: 1;
            transition: opacity 0.5s;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 10;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Start Screen Overlay */
        #screen-start {
            background: #5a0002;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 25;
        }

        .start-logo {
            width: clamp(60px, 20vmin, 100px);
            height: clamp(60px, 20vmin, 100px);
            background: #da291c;
            color: #ffc72c;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(35px, 13vmin, 60px);
            font-weight: 900;
            margin-bottom: clamp(8px, 3vmin, 15px);
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
            border: 3px solid #ffc72c;
        }

        .start-title {
            font-size: clamp(20px, 6vmin, 30px);
            font-weight: 900;
            margin-bottom: clamp(3px, 1vmin, 5px);
        }

        .start-subtitle {
            font-size: clamp(14px, 4.5vmin, 18px);
            font-weight: 700;
            margin-bottom: clamp(10px, 4vmin, 20px);
        }

        .start-loading {
            font-size: clamp(11px, 3.5vmin, 14px);
            color: rgba(255,255,255,0.6);
            margin-bottom: clamp(20px, 8vmin, 40px);
        }

        .start-box {
            font-size: clamp(50px, 18vmin, 90px);
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Game Screen */
        #screen-game {
            z-index: 5;
        }

        /* Tilt Hint */
        .tilt-hint {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            padding: clamp(8px, 3vmin, 12px) clamp(14px, 5vmin, 20px);
            border-radius: 25px;
            font-size: clamp(11px, 3.5vmin, 14px);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: clamp(6px, 2.5vmin, 10px);
            white-space: nowrap;
            opacity: 1;
            transition: opacity 1s ease;
            pointer-events: none;
            z-index: 8;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Player Basket (Fries) */
        .player-basket {
            position: absolute;
            bottom: clamp(15px, 4vh, 40px);
            left: 0;
            font-size: clamp(50px, 18vmin, 90px);
            line-height: 1;
            z-index: 10;
            will-change: transform;
            transition: transform 150ms ease-out;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
        }

        /* Falling Items */
        .falling-item {
            position: absolute;
            top: 0;
            font-size: clamp(30px, 12vmin, 55px);
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
            z-index: 6;
            will-change: transform;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* +1 / Bomb Float Text */
        .float-text {
            position: absolute;
            font-size: clamp(20px, 7vmin, 30px);
            font-weight: 900;
            color: #ffc72c;
            text-shadow: 0 3px 6px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 11;
            animation: floatUp 0.8s ease-out forwards;
        }

        .float-text.negative {
            color: #ff4d4d;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.3); opacity: 0; }
        }

        /* Result Screens (Overlay) */
        .overlay-screen {
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            padding: clamp(12px, 5vmin, 20px);
            z-index: 30;
        }

        .result-card {
            background: #f4f4f4;
            color: #333;
            width: 90%;
            max-width: 340px;
            border-radius: 20px;
            padding: clamp(24px, 8vmin, 40px) clamp(14px, 5vmin, 20px);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .result-image {
            font-size: clamp(60px, 20vmin, 100px);
            margin-bottom: 10px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .result-title {
            font-size: clamp(24px, 7vmin, 34px);
            font-weight: 900;
            color: #da291c;
            margin-bottom: clamp(8px, 3vmin, 15px);
        }

        .result-desc {
            font-size: clamp(13px, 4vmin, 16px);
            color: #444;
            line-height: 1.4;
            margin-bottom: clamp(16px, 6vmin, 30px);
            font-weight: 700;
        }

        .action-btn {
            background: transparent;
            border: 2px solid #da291c;
            padding: clamp(8px, 3vmin, 12px) clamp(18px, 7vmin, 30px);
            border-radius: 25px;
            font-size: clamp(12px, 3.8vmin, 15px);
            font-weight: 800;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: clamp(5px, 2vmin, 8px);
            color: #da291c;
            transition: all 0.2s;
        }

        .action-btn:active {
            background: rgba(218, 41, 28, 0.1);
        }

    </style>
</head>
<body>

<div class="ad-container" id="game-container">

    <div class="score-pill" id="score-pill">
        <span style="color: #ffc72c;">⭐</span> <span id="score-text">0/6</span>
    </div>

    <!-- Start Screen Overlay -->
    <div id="screen-start" class="screen active">
        <div class="start-logo">M</div>
        <h2 class="start-title">McDonald's</h2>
        <p class="start-subtitle">Play & save $5</p>
        <p class="start-loading">Get ready to play...</p>
        <div class="start-box">🍟</div>
    </div>

    <!-- Game Screen -->
    <div id="screen-game" class="screen">
        <div class="tilt-hint" id="tilt-hint">📱 Tilt your phone to catch treats!</div>
        <div class="player-basket" id="player">🍟</div>
    </div>

    <!-- Win Screen -->
    <div id="screen-win" class="screen overlay-screen">
        <div class="result-card">
            <div class="result-image">🎉</div>
            <h2 class="result-title">You Won!</h2>
            <p class="result-desc">You've unlocked<br>$5 off your next<br>McDonald's order!</p>
            <button class="action-btn" onclick="resetGame()">↺ Play Again</button>
        </div>
    </div>

    <!-- Lose Screen (Caught Bomb) -->
    <div id="screen-lose" class="screen overlay-screen">
        <div class="result-card">
            <div class="result-image">💥</div>
            <h2 class="result-title" style="color: #333;">Boom!</h2>
            <p class="result-desc">You caught a bomb!<br>Avoid the bombs next time.</p>
            <button class="action-btn" style="border-color: #333; color: #333;" onclick="resetGame()">↺ Try Again</button>
        </div>
    </div>

</div>

<script>
    // Game Configuration
    const TARGET_SCORE = 6;
    const GOOD_ITEMS = ['🍔', '🍟', '🍦', '🥤', '☕'];
    const BAD_ITEMS = ['💣'];

    // Core JS State (Bulletproof logic, strictly decoupled from DOM attributes)
    let score = 0;
    let isPlaying = false;
    let gameLoop;
    let spawnInterval;
    let activeItems = []; // Contains objects with layout and {type: 'good'|'bad'}

    // DOM Elements
    const container = document.getElementById('game-container');
    const player = document.getElementById('player');
    const screenStart = document.getElementById('screen-start');
    const screenGame = document.getElementById('screen-game');
    const screenWin = document.getElementById('screen-win');
    const screenLose = document.getElementById('screen-lose');
    const scoreText = document.getElementById('score-text');
    const tiltHint = document.getElementById('tilt-hint');

    // Player Configuration
    let playerX = container.clientWidth / 2;
    let targetX = playerX;
    let smoothedTilt = 0;
    let _deviceGamma = null;
    const TILT_CLAMP = 0.5;
    const TILT_SMOOTHING = 0.08;

    function getPlayerWidth() {
        return Math.max(50, container.clientWidth * 0.175);
    }
    function getHeightScale() {
        return container.clientHeight / 750;
    }

    player.style.transform = `translateX(${playerX}px) translateX(-50%)`;

    function beginCountdown() {
        setTimeout(() => {
            screenStart.classList.remove('active');
            screenGame.classList.add('active');

            setTimeout(() => {
                setupControls();
                startGame();

                setTimeout(() => {
                    tiltHint.style.opacity = '0';
                }, 3500);
            }, 300);
        }, 1200);
    }

    // MRAID Integration
    let hasStarted = false;

    function tryStart() {
        if (hasStarted) return;
        hasStarted = true;
        beginCountdown();
    }

    function onViewable(viewable) {
        if (viewable) {
            if (!hasStarted) {
                tryStart();
            } else {
                resumeGame();
            }
        } else {
            pauseGame();
        }
    }

    if (typeof mraid !== 'undefined') {
        mraid.addEventListener('viewableChange', onViewable);

        if (mraid.getState() !== 'loading' && mraid.isViewable()) {
            tryStart();
        }

        mraid.addEventListener('ready', function () {
            if (mraid.isViewable()) {
                tryStart();
            }
        });
    } else {
        window.onload = () => {
            setTimeout(beginCountdown, 2500);
        };
    }

    function startGame() {
        score = 0;
        updateScoreUI();
        isPlaying = true;

        // Clear old items from logic and DOM
        activeItems.forEach(item => item.el.remove());
        activeItems = [];

        // Begin loops
        spawnInterval = setInterval(spawnItem, 800);
        gameLoop = requestAnimationFrame(update);
    }

    function spawnItem() {
        if (!isPlaying) return;

        // 20% chance to spawn a bad item (bomb)
        const isBad = Math.random() > 0.8;
        const charSet = isBad ? BAD_ITEMS : GOOD_ITEMS;
        const emoji = charSet[Math.floor(Math.random() * charSet.length)];

        // Create DOM element
        const itemEl = document.createElement('div');
        itemEl.classList.add('falling-item');
        itemEl.innerText = emoji;

        // Random X position ensuring it stays within container bounds
        const cw = container.clientWidth;
        const itemWidth = Math.max(30, cw * 0.1125);
        const startX = Math.random() * (cw - itemWidth);
        itemEl.style.left = `${startX}px`;
        itemEl.style.transform = `translateY(-60px)`;

        screenGame.appendChild(itemEl);

        activeItems.push({
            el: itemEl,
            y: -60,
            x: startX,
            speed: (3 + Math.random() * 3) * getHeightScale(),
            type: isBad ? 'bad' : 'good'
        });
    }

    function update() {
        if (!isPlaying || isPaused) return;

        let rawTilt = null;
        const accel = window._nativeAccel;
        if (accel && typeof accel.x === 'number') {
            rawTilt = Math.max(-1, Math.min(1, accel.x / TILT_CLAMP));
        } else if (_deviceGamma !== null) {
            rawTilt = Math.max(-1, Math.min(1, _deviceGamma / 30));
        }
        if (rawTilt !== null) {
            smoothedTilt += (rawTilt - smoothedTilt) * TILT_SMOOTHING;
            const cw = container.clientWidth;
            const pw = getPlayerWidth();
            let newX = (cw / 2) + smoothedTilt * (cw / 2);
            targetX = Math.max(pw / 2, Math.min(cw - pw / 2, newX));
        }

        player.style.transform = `translateX(${Math.round(targetX)}px) translateX(-50%)`;

        const playerRect = player.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();

        // Loop backwards so we can safely splice caught/missed items from the array
        for (let i = activeItems.length - 1; i >= 0; i--) {
            let item = activeItems[i];

            // Move item down
            item.y += item.speed;
            item.el.style.transform = `translateY(${item.y}px)`;

            const itemRect = item.el.getBoundingClientRect();

            const hitPaddingX = Math.max(8, container.clientWidth * 0.04);
            const hitPaddingY = Math.max(10, container.clientHeight * 0.03);

            if (
                itemRect.left < (playerRect.right - hitPaddingX) &&
                itemRect.right > (playerRect.left + hitPaddingX) &&
                itemRect.bottom > (playerRect.top + hitPaddingY) &&
                itemRect.top < playerRect.bottom
            ) {
                // Item successfully caught
                handleCatch(item, i);
                continue;
            }

            // Missed item (fell past screen bounds)
            if (item.y > containerRect.height) {
                item.el.remove();
                activeItems.splice(i, 1);
            }
        }

        // Continue engine if still playing
        if (isPlaying) {
            gameLoop = requestAnimationFrame(update);
        }
    }

    function handleCatch(item, index) {
        // Read the type safely from our tracked JS object, ignoring DOM completely
        if (item.type === 'good') {
            score++;
            showFloatText('+1', item.x, player.offsetTop - container.clientHeight * 0.05, false);
            updateScoreUI();

            // Clean up item
            item.el.remove();
            activeItems.splice(index, 1);

            // Win Condition
            if (score >= TARGET_SCORE) {
                triggerWin();
            }
        } else if (item.type === 'bad') {
            // Bomb caught -> Instant Lose
            showFloatText('💥', item.x, player.offsetTop - container.clientHeight * 0.05, true);
            item.el.remove();
            activeItems.splice(index, 1);
            triggerLose();
        }
    }

    function showFloatText(text, x, y, isNegative) {
        const floatEl = document.createElement('div');
        floatEl.classList.add('float-text');
        if (isNegative) floatEl.classList.add('negative');
        floatEl.innerText = text;
        floatEl.style.left = `${x}px`;
        floatEl.style.top = `${y}px`;
        screenGame.appendChild(floatEl);

        setTimeout(() => {
            floatEl.remove();
        }, 800);
    }

    function updateScoreUI() {
        scoreText.innerText = `${score}/${TARGET_SCORE}`;
    }

    let isPaused = false;

    function pauseGame() {
        if (!isPlaying || isPaused) return;
        isPaused = true;
        cancelAnimationFrame(gameLoop);
        clearInterval(spawnInterval);
    }

    function resumeGame() {
        if (!isPlaying || !isPaused) return;
        isPaused = false;
        spawnInterval = setInterval(spawnItem, 800);
        gameLoop = requestAnimationFrame(update);
    }

    function stopEngine() {
        isPlaying = false;
        isPaused = false;
        cancelAnimationFrame(gameLoop);
        clearInterval(spawnInterval);
    }

    function triggerWin() {
        stopEngine();
        setTimeout(() => {
            screenWin.classList.add('active');
        }, 300);
    }

    function triggerLose() {
        stopEngine();
        setTimeout(() => {
            screenLose.classList.add('active');
        }, 300);
    }

    function resetGame() {
        screenWin.classList.remove('active');
        screenLose.classList.remove('active');

        // Show tilt hint again briefly
        tiltHint.style.opacity = '1';
        setTimeout(() => {
            tiltHint.style.opacity = '0';
        }, 3000);

        startGame();
    }

    // --- INPUT CONTROLS --- //
    function setupControls() {
        const updatePlayerX = (clientX) => {
            const containerRect = container.getBoundingClientRect();
            const pw = getPlayerWidth();
            let x = clientX - containerRect.left;

            if (x < pw / 2) x = pw / 2;
            if (x > containerRect.width - pw / 2) x = containerRect.width - pw / 2;

            targetX = x;
            playerX = x;
        };

        // Touch & Drag Controls
        container.addEventListener('touchmove', (e) => {
            if(!isPlaying) return;
            e.preventDefault();
            updatePlayerX(e.touches[0].clientX);
        }, { passive: false });

        let isMouseDown = false;
        container.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            updatePlayerX(e.clientX);
        });
        window.addEventListener('mouseup', () => {
            isMouseDown = false;
        });
        container.addEventListener('mousemove', (e) => {
            if (isMouseDown && isPlaying) updatePlayerX(e.clientX);
        });

        window.addEventListener('deviceorientation', (e) => {
            if (e.gamma !== null) _deviceGamma = e.gamma;
        });
    }
</script>

</body>
</html>
