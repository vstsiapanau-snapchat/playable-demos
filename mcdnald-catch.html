<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>McDonald's - Catch Treats</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Prevent page scrolling while dragging */
        }

        /* Main Game Container */
        .ad-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 750px;
            background: radial-gradient(circle at top right, #da291c 0%, #9e0b0f 50%, #5a0002 100%);
            position: relative;
            overflow: hidden;
            color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Subtle Background Pattern */
        .ad-container::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image:
                radial-gradient(circle at center, rgba(255,255,255,0.04) 0%, transparent 50%),
                repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(255,255,255,0.02) 30px, rgba(255,255,255,0.02) 60px);
            pointer-events: none;
            z-index: 0;
            animation: bgDrift 40s linear infinite;
        }

        @keyframes bgDrift {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50px); }
        }

        /* Top Header */
        .ad-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            z-index: 20;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
        }

        .brand-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 35px;
            height: 35px;
            background: #da291c;
            color: #ffc72c;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: 900;
            line-height: 1;
            border: 2px solid #ffc72c;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .brand-text-wrapper h1 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .brand-text-wrapper p {
            font-size: 11px;
            color: rgba(255,255,255,0.8);
        }

        .score-pill {
            font-size: 14px;
            font-weight: 700;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 1;
            transition: opacity 0.5s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 10;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Start Screen Overlay */
        #screen-start {
            background: #5a0002;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 25;
        }

        .start-logo {
            width: 80px;
            height: 80px;
            background: #da291c;
            color: #ffc72c;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            font-weight: 900;
            margin-bottom: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
            border: 3px solid #ffc72c;
        }

        .start-title {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .start-subtitle {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .start-loading {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 40px;
        }

        .start-box {
            font-size: 70px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Game Screen */
        #screen-game {
            z-index: 5;
        }

        /* Tilt Hint */
        .tilt-hint {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            opacity: 1;
            transition: opacity 1s ease;
            pointer-events: none;
            z-index: 8;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Player Basket (Fries) */
        .player-basket {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 70px;
            line-height: 1;
            z-index: 10;
            will-change: left;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
        }

        /* Falling Items */
        .falling-item {
            position: absolute;
            font-size: 45px;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
            z-index: 6;
            will-change: top;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* +1 / Bomb Float Text */
        .float-text {
            position: absolute;
            font-size: 26px;
            font-weight: 900;
            color: #ffc72c;
            text-shadow: 0 3px 6px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 11;
            animation: floatUp 0.8s ease-out forwards;
        }

        .float-text.negative {
            color: #ff4d4d;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.3); opacity: 0; }
        }

        /* Result Screens (Overlay) */
        .overlay-screen {
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 30;
        }

        .result-card {
            background: #f4f4f4;
            color: #333;
            width: 100%;
            max-width: 340px;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .result-image {
            font-size: 80px;
            margin-bottom: 10px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .result-title {
            font-size: 30px;
            font-weight: 900;
            color: #da291c;
            margin-bottom: 15px;
        }

        .result-desc {
            font-size: 16px;
            color: #444;
            line-height: 1.4;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .action-btn {
            background: transparent;
            border: 2px solid #da291c;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #da291c;
            transition: all 0.2s;
        }

        .action-btn:active {
            background: rgba(218, 41, 28, 0.1);
        }

    </style>
</head>
<body>

<div class="ad-container" id="game-container">

    <!-- Persistent Header -->
    <header class="ad-header" id="main-header">
        <div class="brand-info">
            <div class="logo">M</div>
            <div class="brand-text-wrapper">
                <h1>McDonald's - Ad</h1>
                <p>Catch treats, win big.</p>
            </div>
        </div>
        <div class="score-pill" id="score-pill">
            <span style="color: #ffc72c;">⭐</span> <span id="score-text">0/6</span>
        </div>
    </header>

    <!-- Start Screen Overlay -->
    <div id="screen-start" class="screen active">
        <div class="start-logo">M</div>
        <h2 class="start-title">McDonald's</h2>
        <p class="start-subtitle">Play & save $5</p>
        <p class="start-loading">Get ready to play...</p>
        <div class="start-box">🍟</div>
    </div>

    <!-- Game Screen -->
    <div id="screen-game" class="screen">
        <div class="tilt-hint" id="tilt-hint">📱 Tilt your phone to catch treats!</div>
        <div class="player-basket" id="player">🍟</div>
    </div>

    <!-- Win Screen -->
    <div id="screen-win" class="screen overlay-screen">
        <div class="result-card">
            <div class="result-image">🎉</div>
            <h2 class="result-title">You Won!</h2>
            <p class="result-desc">You've unlocked<br>$5 off your next<br>McDonald's order!</p>
            <button class="action-btn" onclick="resetGame()">↺ Play Again</button>
        </div>
    </div>

    <!-- Lose Screen (Caught Bomb) -->
    <div id="screen-lose" class="screen overlay-screen">
        <div class="result-card">
            <div class="result-image">💥</div>
            <h2 class="result-title" style="color: #333;">Boom!</h2>
            <p class="result-desc">You caught a bomb!<br>Avoid the bombs next time.</p>
            <button class="action-btn" style="border-color: #333; color: #333;" onclick="resetGame()">↺ Try Again</button>
        </div>
    </div>

</div>

<script>
    // Game Configuration
    const TARGET_SCORE = 6;
    const GOOD_ITEMS = ['🍔', '🍟', '🍦', '🥤', '☕'];
    const BAD_ITEMS = ['💣'];

    // Core JS State (Bulletproof logic, strictly decoupled from DOM attributes)
    let score = 0;
    let isPlaying = false;
    let gameLoop;
    let spawnInterval;
    let activeItems = []; // Contains objects with layout and {type: 'good'|'bad'}

    // DOM Elements
    const container = document.getElementById('game-container');
    const player = document.getElementById('player');
    const screenStart = document.getElementById('screen-start');
    const screenGame = document.getElementById('screen-game');
    const screenWin = document.getElementById('screen-win');
    const screenLose = document.getElementById('screen-lose');
    const scoreText = document.getElementById('score-text');
    const tiltHint = document.getElementById('tilt-hint');

    // Player Configuration
    let playerX = container.clientWidth / 2;
    const playerWidth = 70; // Approximate width of the Fries emoji

    // Initial Start Sequence
    window.onload = () => {
        setTimeout(() => {
            screenStart.classList.remove('active');
            screenGame.classList.add('active');

            setTimeout(() => {
                setupControls();
                startGame();

                // Fade out hint after playing starts
                setTimeout(() => {
                    tiltHint.style.opacity = '0';
                }, 3500);
            }, 300);
        }, 2500); // Intro screen delay
    };

    function startGame() {
        score = 0;
        updateScoreUI();
        isPlaying = true;

        // Clear old items from logic and DOM
        activeItems.forEach(item => item.el.remove());
        activeItems = [];

        // Begin loops
        spawnInterval = setInterval(spawnItem, 800);
        gameLoop = requestAnimationFrame(update);
    }

    function spawnItem() {
        if (!isPlaying) return;

        // 20% chance to spawn a bad item (bomb)
        const isBad = Math.random() > 0.8;
        const charSet = isBad ? BAD_ITEMS : GOOD_ITEMS;
        const emoji = charSet[Math.floor(Math.random() * charSet.length)];

        // Create DOM element
        const itemEl = document.createElement('div');
        itemEl.classList.add('falling-item');
        itemEl.innerText = emoji;

        // Random X position ensuring it stays within container bounds
        const itemWidth = 45;
        const startX = Math.random() * (container.clientWidth - itemWidth);
        itemEl.style.left = `${startX}px`;
        itemEl.style.top = `-60px`;

        screenGame.appendChild(itemEl);

        // Track state completely inside the JS array to avoid dataset errors
        activeItems.push({
            el: itemEl,
            y: -60,
            x: startX,
            speed: 3 + Math.random() * 3, // Variable fall speeds
            type: isBad ? 'bad' : 'good'  // Strict JS state
        });
    }

    function update() {
        if (!isPlaying) return;

        // Bounding rects are the most reliable method for overlap detection
        const playerRect = player.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();

        // Loop backwards so we can safely splice caught/missed items from the array
        for (let i = activeItems.length - 1; i >= 0; i--) {
            let item = activeItems[i];

            // Move item down
            item.y += item.speed;
            item.el.style.top = `${item.y}px`;

            const itemRect = item.el.getBoundingClientRect();

            // AABB (Axis-Aligned Bounding Box) Collision Detection
            // Padding added so the player has to overlap the middle of the basket
            const hitPaddingX = 15;
            const hitPaddingY = 20;

            if (
                itemRect.left < (playerRect.right - hitPaddingX) &&
                itemRect.right > (playerRect.left + hitPaddingX) &&
                itemRect.bottom > (playerRect.top + hitPaddingY) &&
                itemRect.top < playerRect.bottom
            ) {
                // Item successfully caught
                handleCatch(item, i);
                continue;
            }

            // Missed item (fell past screen bounds)
            if (item.y > containerRect.height) {
                item.el.remove();
                activeItems.splice(i, 1);
            }
        }

        // Continue engine if still playing
        if (isPlaying) {
            gameLoop = requestAnimationFrame(update);
        }
    }

    function handleCatch(item, index) {
        // Read the type safely from our tracked JS object, ignoring DOM completely
        if (item.type === 'good') {
            score++;
            showFloatText('+1', item.x, player.offsetTop - 40, false);
            updateScoreUI();

            // Clean up item
            item.el.remove();
            activeItems.splice(index, 1);

            // Win Condition
            if (score >= TARGET_SCORE) {
                triggerWin();
            }
        } else if (item.type === 'bad') {
            // Bomb caught -> Instant Lose
            showFloatText('💥', item.x, player.offsetTop - 40, true);
            item.el.remove();
            activeItems.splice(index, 1);
            triggerLose();
        }
    }

    function showFloatText(text, x, y, isNegative) {
        const floatEl = document.createElement('div');
        floatEl.classList.add('float-text');
        if (isNegative) floatEl.classList.add('negative');
        floatEl.innerText = text;
        floatEl.style.left = `${x}px`;
        floatEl.style.top = `${y}px`;
        screenGame.appendChild(floatEl);

        setTimeout(() => {
            floatEl.remove();
        }, 800);
    }

    function updateScoreUI() {
        scoreText.innerText = `${score}/${TARGET_SCORE}`;
    }

    function stopEngine() {
        isPlaying = false;
        cancelAnimationFrame(gameLoop);
        clearInterval(spawnInterval);
    }

    function triggerWin() {
        stopEngine();
        setTimeout(() => {
            screenWin.classList.add('active');
        }, 300);
    }

    function triggerLose() {
        stopEngine();
        setTimeout(() => {
            screenLose.classList.add('active');
        }, 300);
    }

    function resetGame() {
        screenWin.classList.remove('active');
        screenLose.classList.remove('active');

        // Show tilt hint again briefly
        tiltHint.style.opacity = '1';
        setTimeout(() => {
            tiltHint.style.opacity = '0';
        }, 3000);

        startGame();
    }

    // --- INPUT CONTROLS --- //
    function setupControls() {
        const updatePlayerX = (clientX) => {
            const containerRect = container.getBoundingClientRect();
            let x = clientX - containerRect.left;

            if (x < playerWidth / 2) x = playerWidth / 2;
            if (x > containerRect.width - playerWidth / 2) x = containerRect.width - playerWidth / 2;

            playerX = x;
            player.style.left = `${playerX}px`;
        };

        // Touch & Drag Controls
        container.addEventListener('touchmove', (e) => {
            if(!isPlaying) return;
            e.preventDefault();
            updatePlayerX(e.touches[0].clientX);
        }, { passive: false });

        let isMouseDown = false;
        container.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            updatePlayerX(e.clientX);
        });
        window.addEventListener('mouseup', () => {
            isMouseDown = false;
        });
        container.addEventListener('mousemove', (e) => {
            if (isMouseDown && isPlaying) updatePlayerX(e.clientX);
        });

        // Native accelerometer shim: the native layer sets window._nativeAccel = {x, y, z}
        // CMAcceleration x maps to lateral tilt (positive = tilted right).
        // Clamp to [-0.5, 0.5] for comfortable gameplay (~30° tilt range).
        const TILT_CLAMP = 0.5;
        let accelPollId = null;

        function pollNativeAccel() {
            if (!isPlaying) {
                accelPollId = requestAnimationFrame(pollNativeAccel);
                return;
            }

            const accel = window._nativeAccel;
            if (accel && typeof accel.x === 'number') {
                let tilt = accel.x;
                if (tilt > TILT_CLAMP) tilt = TILT_CLAMP;
                if (tilt < -TILT_CLAMP) tilt = -TILT_CLAMP;

                const containerWidth = container.clientWidth;
                let newX = (containerWidth / 2) + (tilt / TILT_CLAMP) * (containerWidth / 2);

                if (newX < playerWidth / 2) newX = playerWidth / 2;
                if (newX > containerWidth - playerWidth / 2) newX = containerWidth - playerWidth / 2;

                playerX = newX;
                player.style.left = `${playerX}px`;
            }

            accelPollId = requestAnimationFrame(pollNativeAccel);
        }

        accelPollId = requestAnimationFrame(pollNativeAccel);

        // Browser deviceorientation fallback (for non-native contexts)
        window.addEventListener('deviceorientation', (e) => {
            if (!isPlaying || e.gamma === null) return;

            let tilt = e.gamma;
            if (tilt > 30) tilt = 30;
            if (tilt < -30) tilt = -30;

            const containerWidth = container.clientWidth;
            let newX = (containerWidth / 2) + ((tilt / 30) * (containerWidth / 2));

            if (newX < playerWidth / 2) newX = playerWidth / 2;
            if (newX > containerWidth - playerWidth / 2) newX = containerWidth - playerWidth / 2;

            playerX = newX;
            player.style.left = `${playerX}px`;
        });
    }
</script>

</body>
</html>
