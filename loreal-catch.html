<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'Oréal – Catch & Glow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body { background-color: #111; margin: 0; touch-action: none; }

        .ad-container {
            position: fixed; inset: 0;
            background: radial-gradient(circle at top right, #E01F8C 0%, #8B0057 50%, #3D0028 100%);
            overflow: hidden; color: white; display: flex; flex-direction: column;
        }
        .ad-container::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: radial-gradient(circle at center, rgba(255,255,255,0.04) 0%, transparent 50%),
                repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(255,255,255,0.02) 30px, rgba(255,255,255,0.02) 60px);
            pointer-events: none; z-index: 0; animation: bgDrift 40s linear infinite;
        }
        @keyframes bgDrift { 0% { transform: translateY(0); } 100% { transform: translateY(-50px); } }

        .score-pill {
            position: absolute; top: clamp(60px,15vmin,90px); right: clamp(10px,4vmin,20px); z-index: 20;
            font-size: clamp(11px,3.5vmin,14px); font-weight: 700; background: rgba(0,0,0,0.5);
            padding: clamp(4px,1.5vmin,6px) clamp(8px,3vmin,12px); border-radius: 20px;
            display: flex; align-items: center; gap: clamp(4px,1.5vmin,6px);
            border: 1px solid rgba(255,255,255,0.2); color: white;
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease; z-index: 10;
        }
        .screen.active { opacity: 1; pointer-events: auto; }

        #screen-start {
            background: linear-gradient(160deg, #3D0028 0%, #1a0011 100%);
            justify-content: center; align-items: center; text-align: center; z-index: 25; gap: 8px;
        }
        .brand-logo {
            font-size: clamp(13px,4vmin,18px); font-weight: 900; letter-spacing: 3px;
            text-transform: uppercase; color: white; margin-bottom: 4px;
        }
        .brand-logo span { color: #FFB6D9; }
        .start-title { font-size: clamp(22px,7vmin,32px); font-weight: 900; }
        .start-subtitle { font-size: clamp(13px,4vmin,17px); font-weight: 700; color: rgba(255,255,255,0.8); }
        .start-bottle {
            width: clamp(80px,22vmin,120px); animation: bounce 2s infinite ease-in-out;
            filter: drop-shadow(0 12px 16px rgba(0,0,0,0.5));
        }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-18px); } }

        #screen-game { z-index: 5; }

        .tilt-hint {
            position: absolute; top: 60%; left: 50%; transform: translate(-50%,-50%);
            background: rgba(0,0,0,0.7); padding: clamp(8px,3vmin,12px) clamp(14px,5vmin,20px);
            border-radius: 25px; font-size: clamp(11px,3.5vmin,14px); font-weight: 700;
            display: flex; align-items: center; gap: clamp(6px,2.5vmin,10px); white-space: nowrap;
            opacity: 1; transition: opacity 1s ease; pointer-events: none; z-index: 8;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .player-basket {
            position: absolute; bottom: clamp(15px,4vh,40px); left: 0;
            line-height: 1; z-index: 10; will-change: transform;
            transition: transform 150ms ease-out; font-size: clamp(50px,18vmin,90px);
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
        }

        .falling-item {
            position: absolute; top: 0; z-index: 6; will-change: transform;
            display: flex; justify-content: center; align-items: center;
        }
        .falling-item img {
            width: clamp(36px,12vmin,60px); height: auto;
            filter: drop-shadow(0 5px 8px rgba(0,0,0,0.4));
        }
        .falling-item.bad img { filter: grayscale(1) brightness(0.5) drop-shadow(0 5px 8px rgba(0,0,0,0.4)); }

        .float-text {
            position: absolute; font-size: clamp(20px,7vmin,30px); font-weight: 900;
            color: #FFD700; text-shadow: 0 3px 6px rgba(0,0,0,0.8);
            pointer-events: none; z-index: 11; animation: floatUp 0.8s ease-out forwards;
        }
        .float-text.negative { color: #ff4d4d; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-60px) scale(1.3); opacity: 0; } }

        .overlay-screen {
            background: rgba(20,0,12,0.6); justify-content: center; align-items: center;
            padding: clamp(12px,5vmin,20px); z-index: 30;
        }
        .result-heading {
            font-size: clamp(16px,5vmin,22px); font-weight: 900; color: #FFB6D9;
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: clamp(12px,4vmin,20px);
        }
        .result-card {
            background: #f9f0f5; color: #333; width: 90%; max-width: 340px; border-radius: 20px;
            padding: clamp(20px,6vmin,32px) clamp(14px,5vmin,20px) clamp(24px,8vmin,40px);
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; margin-bottom: clamp(20px,6vmin,32px);
        }
        .result-image { width: clamp(90px,30vmin,150px); height: auto; margin-bottom: clamp(4px,2vmin,10px);
            animation: pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275); }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .result-title { font-size: clamp(20px,6.5vmin,30px); font-weight: 900; color: #222; margin-bottom: clamp(6px,2vmin,10px); }
        .result-desc { font-size: clamp(12px,3.8vmin,15px); color: #555; line-height: 1.5; font-weight: 600; }

        .cta-btn {
            background: #E01F8C; border: none; height: 48px; padding: 0 20px;
            border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            color: white; transition: all 0.2s; margin-bottom: clamp(12px,3.5vmin,18px);
            box-shadow: 0px 4px 16px rgba(224,31,140,0.5);
        }
        .cta-btn:active { background: #b8006e; }

        .play-again-btn {
            background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.2);
            padding: clamp(8px,2.5vmin,12px) clamp(18px,5.5vmin,26px); border-radius: 25px;
            font-size: clamp(12px,3.5vmin,15px); font-weight: 700; cursor: pointer;
            display: inline-flex; align-items: center; gap: clamp(5px,1.5vmin,7px);
            color: rgba(255,255,255,0.6); transition: all 0.2s;
        }
        .play-again-btn:active { background: rgba(255,255,255,0.2); color: white; }
    </style>
</head>
<body>
<div class="ad-container" id="game-container">

    <div id="screen-start" class="screen active">
        <img class="start-bottle" src="loreal-bottle.png" alt="NYX bottle">
        <div class="brand-logo">NYX <span>Professional Makeup</span></div>
        <h2 class="start-title">Catch & Glow</h2>
        <p class="start-subtitle">Catch the bottles, dodge the duds!</p>
    </div>

    <div class="score-pill" id="score-pill">
        <span>💄</span> <span id="score-text">0/8</span>
    </div>

    <div id="screen-game" class="screen">
        <div class="tilt-hint" id="tilt-hint">👆 Drag or tilt to move</div>
        <div id="player" class="player-basket">💋</div>
    </div>

    <div id="screen-win" class="screen overlay-screen">
        <div class="result-heading">You're Glowing! ✨</div>
        <div class="result-card">
            <img class="result-image" src="loreal-bottle.png" alt="NYX bottle">
            <h2 class="result-title">Make 'Em Wonder!</h2>
            <p class="result-desc">Soft Matte Buildable Foundation. Full coverage, all-day wear.</p>
        </div>
        <button class="cta-btn" onclick="handleCTA()">✨ Shop Now</button>
        <button class="play-again-btn" onclick="resetGame()">▶ Play Again</button>
    </div>

    <div id="screen-lose" class="screen overlay-screen">
        <div class="result-heading">So close! 💔</div>
        <div class="result-card">
            <img class="result-image" src="loreal-bottle.png" alt="NYX bottle">
            <h2 class="result-title">Try Again?</h2>
            <p class="result-desc">The Make'Em Wonder Foundation is waiting for you — don't give up!</p>
        </div>
        <button class="cta-btn" onclick="handleCTA()">✨ Shop Now</button>
        <button class="play-again-btn" onclick="resetGame()">▶ Try Again</button>
    </div>

</div>

<script>
    const TARGET_SCORE = 8;
    // Bad item is a greyed-out broken bottle (same image, styled differently via CSS)
    let score = 0, isPlaying = false, isPaused = false;
    let gameLoop, spawnInterval;
    let activeItems = [];

    const container = document.getElementById('game-container');
    const player = document.getElementById('player');
    const screenStart = document.getElementById('screen-start');
    const screenGame = document.getElementById('screen-game');
    const screenWin = document.getElementById('screen-win');
    const screenLose = document.getElementById('screen-lose');
    const scoreText = document.getElementById('score-text');
    const scorePill = document.getElementById('score-pill');
    const tiltHint = document.getElementById('tilt-hint');

    let playerX = container.clientWidth / 2;
    let targetX = playerX;
    let smoothedTilt = 0;
    let _deviceGamma = null;
    const TILT_CLAMP = 0.5;
    const TILT_SMOOTHING = 0.08;

    function getPlayerWidth() { return Math.max(50, container.clientWidth * 0.175); }
    function getHeightScale() { return container.clientHeight / 750; }

    player.style.transform = `translateX(${playerX}px) translateX(-50%)`;

    function beginCountdown() {
        setTimeout(() => {
            screenStart.classList.remove('active');
            screenGame.classList.add('active');
            scorePill.style.opacity = '1';
            setTimeout(() => {
                setupControls();
                startGame();
                setTimeout(() => { tiltHint.style.opacity = '0'; }, 3500);
            }, 300);
        }, 1200);
    }

    let hasStarted = false;
    function tryStart() { if (hasStarted) return; hasStarted = true; beginCountdown(); }
    function onViewable(viewable) { if (viewable) { if (!hasStarted) tryStart(); else resumeGame(); } else { pauseGame(); } }

    if (typeof mraid !== 'undefined') {
        mraid.addEventListener('viewableChange', onViewable);
        if (mraid.getState() !== 'loading' && mraid.isViewable()) tryStart();
        mraid.addEventListener('ready', function() { if (mraid.isViewable()) tryStart(); });
    } else {
        window.onload = () => { setTimeout(beginCountdown, 2500); };
    }

    function startGame() {
        score = 0; updateScoreUI(); isPlaying = true;
        activeItems.forEach(item => item.el.remove());
        activeItems = [];
        spawnInterval = setInterval(spawnItem, 900);
        gameLoop = requestAnimationFrame(update);
    }

    const BOTTLE_SRC = 'loreal-bottle.png';

    function spawnItem() {
        if (!isPlaying) return;
        const isBad = Math.random() > 0.78;
        const itemEl = document.createElement('div');
        itemEl.classList.add('falling-item');
        if (isBad) itemEl.classList.add('bad');
        const img = document.createElement('img');
        img.src = BOTTLE_SRC;
        img.alt = '';
        itemEl.appendChild(img);

        const cw = container.clientWidth;
        const itemWidth = Math.max(30, cw * 0.1);
        const startX = Math.random() * (cw - itemWidth);
        itemEl.style.left = `${startX}px`;
        itemEl.style.transform = `translateY(-70px)`;
        screenGame.appendChild(itemEl);

        activeItems.push({
            el: itemEl, y: -70, x: startX,
            speed: (2.5 + Math.random() * 3) * getHeightScale(),
            type: isBad ? 'bad' : 'good'
        });
    }

    function update() {
        if (!isPlaying || isPaused) return;
        let rawTilt = null;
        const accel = window._nativeAccel;
        if (accel && typeof accel.x === 'number') {
            rawTilt = Math.max(-1, Math.min(1, accel.x / TILT_CLAMP));
        } else if (_deviceGamma !== null) {
            rawTilt = Math.max(-1, Math.min(1, _deviceGamma / 30));
        }
        if (rawTilt !== null) {
            smoothedTilt += (rawTilt - smoothedTilt) * TILT_SMOOTHING;
            const cw = container.clientWidth, pw = getPlayerWidth();
            let newX = (cw / 2) + smoothedTilt * (cw / 2);
            targetX = Math.max(pw / 2, Math.min(cw - pw / 2, newX));
        }
        player.style.transform = `translateX(${Math.round(targetX)}px) translateX(-50%)`;

        const playerRect = player.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();

        for (let i = activeItems.length - 1; i >= 0; i--) {
            let item = activeItems[i];
            item.y += item.speed;
            item.el.style.transform = `translateY(${item.y}px)`;
            const itemRect = item.el.getBoundingClientRect();
            const hitPX = Math.max(8, container.clientWidth * 0.04);
            const hitPY = Math.max(10, container.clientHeight * 0.03);
            if (itemRect.left < (playerRect.right - hitPX) && itemRect.right > (playerRect.left + hitPX) &&
                itemRect.bottom > (playerRect.top + hitPY) && itemRect.top < playerRect.bottom) {
                handleCatch(item, i); continue;
            }
            if (item.y > containerRect.height) { item.el.remove(); activeItems.splice(i, 1); }
        }
        if (isPlaying) gameLoop = requestAnimationFrame(update);
    }

    function handleCatch(item, index) {
        if (item.type === 'good') {
            score++;
            showFloatText('+1', item.x, player.offsetTop - container.clientHeight * 0.05, false);
            updateScoreUI();
            item.el.remove(); activeItems.splice(index, 1);
            if (score >= TARGET_SCORE) triggerWin();
        } else {
            showFloatText('💥', item.x, player.offsetTop - container.clientHeight * 0.05, true);
            item.el.remove(); activeItems.splice(index, 1);
            triggerLose();
        }
    }

    function showFloatText(text, x, y, isNegative) {
        const el = document.createElement('div');
        el.classList.add('float-text');
        if (isNegative) el.classList.add('negative');
        el.innerText = text; el.style.left = `${x}px`; el.style.top = `${y}px`;
        screenGame.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    function updateScoreUI() { scoreText.innerText = `${score}/${TARGET_SCORE}`; }
    function pauseGame() { if (!isPlaying || isPaused) return; isPaused = true; cancelAnimationFrame(gameLoop); clearInterval(spawnInterval); }
    function resumeGame() { if (!isPlaying || !isPaused) return; isPaused = false; spawnInterval = setInterval(spawnItem, 900); gameLoop = requestAnimationFrame(update); }
    function stopEngine() { isPlaying = false; isPaused = false; cancelAnimationFrame(gameLoop); clearInterval(spawnInterval); }
    function triggerWin() { stopEngine(); setTimeout(() => { screenWin.classList.add('active'); }, 300); }
    function triggerLose() { stopEngine(); setTimeout(() => { screenLose.classList.add('active'); }, 300); }
    function resetGame() {
        screenWin.classList.remove('active'); screenLose.classList.remove('active');
        tiltHint.style.opacity = '1';
        setTimeout(() => { tiltHint.style.opacity = '0'; }, 3000);
        startGame();
    }

    function handleCTA() {
        var url = 'https://www.nyxcosmetics.com/';
        if (typeof mraid !== 'undefined') mraid.open(url);
        else window.open(url, '_blank');
    }

    function setupControls() {
        const updatePlayerX = (clientX) => {
            const rect = container.getBoundingClientRect(), pw = getPlayerWidth();
            let x = clientX - rect.left;
            if (x < pw / 2) x = pw / 2;
            if (x > rect.width - pw / 2) x = rect.width - pw / 2;
            targetX = x; playerX = x;
        };
        container.addEventListener('touchmove', (e) => { if (!isPlaying) return; e.preventDefault(); updatePlayerX(e.touches[0].clientX); }, { passive: false });
        let isMouseDown = false;
        container.addEventListener('mousedown', (e) => { isMouseDown = true; updatePlayerX(e.clientX); });
        window.addEventListener('mouseup', () => { isMouseDown = false; });
        container.addEventListener('mousemove', (e) => { if (isMouseDown && isPlaying) updatePlayerX(e.clientX); });
        window.addEventListener('deviceorientation', (e) => { if (e.gamma !== null) _deviceGamma = e.gamma; });
    }
</script>
</body>
</html>
