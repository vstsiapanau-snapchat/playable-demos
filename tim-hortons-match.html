<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match Donuts, Win Treats</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Main Game Container */
        .ad-container {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #8a000e 0%, #4a0006 100%);
            position: relative;
            overflow: hidden;
            color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .score-pill {
            position: absolute;
            top: 15px;
            right: 20px;
            z-index: 20;
            color: white;
            font-size: 14px;
            font-weight: 700;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 65px; /* Below header */
            left: 0;
            width: 100%;
            height: calc(100% - 65px);
            display: flex;
            flex-direction: column;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 1;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 5;
        }

        /* Game Board */
        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            height: 100%;
            max-height: none;
            margin-top: 10px;
        }

        /* Cards */
        .card {
            perspective: 1000px;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner,
        .card.matched .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .card-back {
            background: #a90d1c;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-back::after {
            content: 'T';
            font-size: clamp(30px, 10vmin, 50px);
            font-weight: 900;
            color: rgba(255,255,255,0.15);
        }

        .card-front {
            background: white;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            color: #333;
            position: relative;
        }

        .card-emoji {
            font-size: clamp(35px, 13vmin, 65px);
            margin-bottom: 10px;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
        }

        .card-name {
            font-size: 11px;
            font-weight: 700;
            text-align: center;
            line-height: 1.2;
        }

        /* Match Checkmark Badge */
        .match-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            background: #d81a2a;
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 12px;
            opacity: 0;
            transform: scale(0);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition-delay: 0.2s;
            z-index: 10;
        }

        .card.matched .match-badge {
            opacity: 1;
            transform: scale(1);
        }

        /* Result Screen */
        #screen-result {
            top: 0;
            height: 100%;
            padding: 0;
            background: rgba(90, 0, 10, 0.55);
            justify-content: center;
            align-items: center;
            z-index: 15;
        }

        .result-heading {
            font-size: clamp(16px, 5vmin, 22px);
            font-weight: 900;
            color: #ffc107;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: clamp(12px, 4vmin, 20px);
        }

        .result-card {
            background: white;
            color: #333;
            width: 90%;
            max-width: 340px;
            border-radius: 20px;
            padding: clamp(20px, 6vmin, 32px) clamp(14px, 5vmin, 20px) clamp(24px, 8vmin, 40px);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: clamp(20px, 6vmin, 32px);
        }

        .result-image {
            font-size: clamp(80px, 28vmin, 140px);
            margin-bottom: clamp(4px, 2vmin, 10px);
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            line-height: 1.1;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .result-title {
            font-size: clamp(22px, 7vmin, 32px);
            font-weight: 900;
            color: #222;
            margin-bottom: clamp(6px, 2vmin, 10px);
        }

        .result-desc {
            font-size: clamp(13px, 4vmin, 16px);
            color: #555;
            line-height: 1.5;
            font-weight: 600;
        }

        .cta-btn {
            background: #FFFFFF;
            border: 1px solid rgba(0, 0, 0, 0.15);
            height: 48px;
            padding: 0 12px 0 11px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 600;
            font-family: -apple-system, 'SF Pro Text', 'Montserrat', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #000000;
            transition: all 0.2s;
            margin-bottom: clamp(12px, 3.5vmin, 18px);
            box-shadow: 0px 2px 12px rgba(0, 0, 0, 0.13);
            max-width: 70%;
            box-sizing: border-box;
        }

        .cta-btn svg {
            flex-shrink: 0;
        }

        .cta-btn:active {
            background: #EEEEEE;
        }

        .play-again-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            padding: clamp(8px, 2.5vmin, 12px) clamp(18px, 5.5vmin, 26px);
            border-radius: 25px;
            font-size: clamp(12px, 3.5vmin, 15px);
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: clamp(5px, 1.5vmin, 7px);
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.2s;
        }

        .play-again-btn:active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
    </style>
</head>
<body>

<div class="ad-container">

    <div class="score-pill">
        <span>🍩</span> <span id="score-text">0/3</span>
    </div>

    <!-- Game Screen -->
    <div id="screen-game" class="screen active">
        <div class="game-board" id="board">
            <!-- Cards generated by JS -->
        </div>
    </div>

    <!-- Result Screen -->
    <div id="screen-result" class="screen">
        <div class="result-heading">YOU MATCHED!</div>
        <div class="result-card">
            <div class="result-image">🍩</div>
            <h2 class="result-title">FREE Donut!</h2>
            <p class="result-desc">You've unlocked<br>$5 off your next Tim Hortons order!</p>
        </div>
        <button class="cta-btn" onclick="handleCTA()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0FADFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg> Redeem $5 Off</button>
        <button class="play-again-btn" onclick="initGame()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg> Play Again</button>
    </div>

</div>

<script>
    const donuts = [
        { id: 'sprinkle', emoji: '🍩', name: 'Sprinkle Donut' },
        { id: 'choco', emoji: '🍫', name: 'Choco Dream' },
        { id: 'cruller', emoji: '🥯', name: 'Honey Cruller' }
    ];

    let cards = [];
    let hasFlippedCard = false;
    let lockBoard = false;
    let firstCard, secondCard;
    let matchesFound = 0;

    const boardElement = document.getElementById('board');
    const scoreTextElement = document.getElementById('score-text');

    function initGame() {
        // Reset state
        hasFlippedCard = false;
        lockBoard = false;
        firstCard = null;
        secondCard = null;
        matchesFound = 0;
        scoreTextElement.innerText = '0/3';

        // Hide result, show game
        document.getElementById('screen-result').classList.remove('active');
        document.getElementById('screen-game').classList.add('active');

        // Create pairs and shuffle
        cards = [...donuts, ...donuts];
        cards.sort(() => Math.random() - 0.5);

        // Build DOM
        boardElement.innerHTML = '';
        cards.forEach((donut, index) => {
            const cardEl = document.createElement('div');
            cardEl.classList.add('card');
            cardEl.dataset.id = donut.id;
            cardEl.innerHTML = `
                <div class="card-inner">
                    <div class="card-back"></div>
                    <div class="card-front">
                        <div class="match-badge">✔</div>
                        <div class="card-emoji">${donut.emoji}</div>
                        <div class="card-name">${donut.name}</div>
                    </div>
                </div>
            `;
            cardEl.addEventListener('click', flipCard);
            boardElement.appendChild(cardEl);
        });
    }

    function flipCard() {
        if (lockBoard) return;
        if (this === firstCard) return;

        this.classList.add('flipped');

        if (!hasFlippedCard) {
            // First click
            hasFlippedCard = true;
            firstCard = this;
            return;
        }

        // Second click
        secondCard = this;
        checkForMatch();
    }

    function checkForMatch() {
        let isMatch = firstCard.dataset.id === secondCard.dataset.id;

        if (isMatch) {
            disableCards();
        } else {
            unflipCards();
        }
    }

    function disableCards() {
        // Match found
        firstCard.removeEventListener('click', flipCard);
        secondCard.removeEventListener('click', flipCard);

        // Add matched class for checkmark animation
        firstCard.classList.add('matched');
        secondCard.classList.add('matched');

        matchesFound++;
        scoreTextElement.innerText = `${matchesFound}/3`;

        resetBoard();

        // Check win condition
        if (matchesFound === 3) {
            setTimeout(() => {
                showResult();
            }, 800);
        }
    }

    function unflipCards() {
        // No match, flip back after delay
        lockBoard = true;

        setTimeout(() => {
            firstCard.classList.remove('flipped');
            secondCard.classList.remove('flipped');
            resetBoard();
        }, 1000);
    }

    function resetBoard() {
        [hasFlippedCard, lockBoard] = [false, false];
        [firstCard, secondCard] = [null, null];
    }

    function showResult() {
        document.getElementById('screen-game').classList.remove('active');
        document.getElementById('screen-result').classList.add('active');
    }

    function handleCTA() {
        var url = 'https://www.example.com/redeem?offer=5off';
        if (typeof mraid !== 'undefined') {
            mraid.open(url);
        } else {
            window.open(url, '_blank');
        }
    }

    function beginCountdown() {
        initGame();
    }

    function onViewable(viewable) {
        if (viewable) {
            beginCountdown();
        }
    }

    function initMRAID() {
        if (mraid.isViewable()) {
            beginCountdown();
        } else {
            mraid.addEventListener('viewableChange', onViewable);
        }
    }

    if (typeof mraid !== 'undefined') {
        if (mraid.getState() === 'loading') {
            mraid.addEventListener('ready', initMRAID);
        } else {
            initMRAID();
        }
    } else {
        window.onload = () => {
            setTimeout(beginCountdown, 2500);
        };
    }
</script>

</body>
</html>
