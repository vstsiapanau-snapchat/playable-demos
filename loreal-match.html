<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'Oréal – Match &amp; Glow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .ad-container {
            width: 100%; height: 100%;
            background: radial-gradient(circle at top right, #E01F8C 0%, #8B0057 50%, #3D0028 100%);
            position: relative; overflow: hidden; color: white;
            display: flex; flex-direction: column;
        }
        .ad-container::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, transparent 50%),
                repeating-radial-gradient(circle at center, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 80px);
            pointer-events: none; z-index: 0; opacity: 0.5;
        }
        .score-pill {
            position: absolute; top: 15px; right: 20px; z-index: 20; color: white;
            font-size: 14px; font-weight: 700; background: rgba(0,0,0,0.4);
            padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 6px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease; z-index: 1;
        }
        .screen.active { opacity: 1; pointer-events: auto; z-index: 5; }
        #screen-start {
            background: linear-gradient(160deg, #3D0028 0%, #1a0011 100%);
            justify-content: center; align-items: center; text-align: center; z-index: 20; gap: 10px;
        }
        .brand-logo { font-size: clamp(12px,3.5vmin,16px); font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
        .brand-logo span { color: #FFB6D9; }
        .start-title { font-size: clamp(22px,7vmin,32px); font-weight: 900; }
        .start-subtitle { font-size: clamp(13px,4vmin,17px); font-weight: 700; color: rgba(255,255,255,0.8); }
        .start-bottle { width: clamp(70px,20vmin,110px); animation: bounce 2s infinite ease-in-out; filter: drop-shadow(0 12px 16px rgba(0,0,0,0.5)); }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-16px); } }

        #screen-game { top: 65px; height: calc(100% - 65px); padding: 16px; }
        .game-board { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; height: 100%; }

        .card { perspective: 1000px; cursor: pointer; width: 100%; height: 100%; }
        .card-inner { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.4,0,0.2,1); transform-style: preserve-3d; }
        .card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { width: 100%; height: 100%; position: absolute; backface-visibility: hidden; border-radius: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .card-back { background: linear-gradient(135deg, #E01F8C, #8B0057); display: flex; justify-content: center; align-items: center; border: 1px solid rgba(255,255,255,0.15); }
        .card-back::after { content: "\2665"; font-size: clamp(36px,13vmin,70px); font-weight: 900; color: rgba(255,255,255,0.25); }
        .card-front { background: #fff5f9; transform: rotateY(180deg); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 8px; position: relative; }
        .card-img { width: clamp(50px,16vmin,80px); height: auto; margin-bottom: 6px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15)); }
        .card-name { font-size: 11px; font-weight: 900; text-align: center; line-height: 1.2; color: #222; }
        .match-badge {
            position: absolute; top: 8px; right: 8px; width: 22px; height: 22px;
            background: #E01F8C; border: 2px solid white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; color: white;
            font-size: 11px; opacity: 0; transform: scale(0);
            transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275) 0.3s; z-index: 10;
        }
        .card.matched .match-badge { opacity: 1; transform: scale(1); }

        #screen-result {
            background: rgba(20,0,12,0.6); justify-content: center; align-items: center;
            padding: clamp(12px,5vmin,20px); z-index: 15;
        }
        .result-heading { font-size: clamp(16px,5vmin,22px); font-weight: 900; color: #FFB6D9; text-transform: uppercase; letter-spacing: 2px; margin-bottom: clamp(12px,4vmin,20px); }
        .result-card {
            background: #f9f0f5; color: #333; width: 90%; max-width: 340px; border-radius: 20px;
            padding: clamp(20px,6vmin,32px) clamp(14px,5vmin,20px) clamp(24px,8vmin,40px);
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; margin-bottom: clamp(20px,6vmin,32px);
        }
        .result-image { width: clamp(90px,30vmin,150px); height: auto; margin-bottom: clamp(4px,2vmin,10px); animation: pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275); }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .result-title { font-size: clamp(20px,6.5vmin,30px); font-weight: 900; color: #222; margin-bottom: clamp(6px,2vmin,10px); }
        .result-desc { font-size: clamp(12px,3.8vmin,15px); color: #555; line-height: 1.5; font-weight: 600; }
        .cta-btn {
            background: #E01F8C; border: none; height: 48px; padding: 0 20px; border-radius: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center;
            justify-content: center; gap: 8px; color: white; transition: all 0.2s;
            margin-bottom: clamp(12px,3.5vmin,18px); box-shadow: 0px 4px 16px rgba(224,31,140,0.5);
        }
        .cta-btn:active { background: #b8006e; }
        .play-again-btn {
            background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.2);
            padding: clamp(8px,2.5vmin,12px) clamp(18px,5.5vmin,26px); border-radius: 25px;
            font-size: clamp(12px,3.5vmin,15px); font-weight: 700; cursor: pointer;
            display: inline-flex; align-items: center; gap: clamp(5px,1.5vmin,7px);
            color: rgba(255,255,255,0.6); transition: all 0.2s;
        }
        .play-again-btn:active { background: rgba(255,255,255,0.2); color: white; }
    </style>
</head>
<body>
<div class="ad-container">

    <div id="screen-start" class="screen active">
        <img class="start-bottle" id="bottle-img" src="loreal-bottle.png" alt="NYX bottle">
        <div class="brand-logo">NYX <span>Professional Makeup</span></div>
        <h2 class="start-title">Match &amp; Glow</h2>
        <p class="start-subtitle">Find the matching shades!</p>
    </div>

    <div class="score-pill">💄 <span id="score-text">0/3</span></div>

    <div id="screen-game" class="screen">
        <div class="game-board" id="board"></div>
    </div>

    <div id="screen-result" class="screen">
        <div class="result-heading">Perfect Match! ✨</div>
        <div class="result-card">
            <img class="result-image" src="loreal-bottle.png" alt="NYX bottle">
            <h2 class="result-title">Make 'Em Wonder!</h2>
            <p class="result-desc">Soft Matte Buildable Foundation. Buildable from medium to full coverage.</p>
        </div>
        <button class="cta-btn" onclick="handleCTA()">✨ Shop Now</button>
        <button class="play-again-btn" onclick="initGame()">▶ Play Again</button>
    </div>

</div>
<script>
    const BOTTLE_SRC = 'loreal-bottle.png';

    const menuItems = [
        { id: 'foundation', imgSrc: BOTTLE_SRC, name: 'Foundation' },
        { id: 'blush',      imgSrc: BOTTLE_SRC, name: 'Blush' },
        { id: 'lipstick',   imgSrc: BOTTLE_SRC, name: 'Lip Color' }
    ];

    let hasFlippedCard = false, lockBoard = false, firstCard, secondCard, matchesFound = 0;
    const boardElement = document.getElementById('board');
    const scoreTextEl = document.getElementById('score-text');
    const screenStart = document.getElementById('screen-start');
    const screenGame = document.getElementById('screen-game');
    const screenResult = document.getElementById('screen-result');

    function beginCountdown() { screenStart.classList.remove('active'); screenGame.classList.add('active'); initGame(); }
    function onViewable(v) { if (v) beginCountdown(); }
    function initMRAID() { if (mraid.isViewable()) beginCountdown(); else mraid.addEventListener('viewableChange', onViewable); }
    if (typeof mraid !== 'undefined') {
        if (mraid.getState() === 'loading') mraid.addEventListener('ready', initMRAID); else initMRAID();
    } else { window.onload = () => { setTimeout(beginCountdown, 2500); }; }

    function initGame() {
        hasFlippedCard = false; lockBoard = false; firstCard = null; secondCard = null; matchesFound = 0;
        scoreTextEl.innerText = '0/3';
        screenResult.classList.remove('active');
        const deck = [...menuItems, ...menuItems].sort(() => Math.random() - 0.5);
        boardElement.innerHTML = '';
        deck.forEach(item => {
            const cardEl = document.createElement('div');
            cardEl.classList.add('card');
            cardEl.dataset.id = item.id;
            const frontContent = item.imgSrc
                ? `<img class="card-img" src="${item.imgSrc}" alt="">`
                : `<div style="font-size:clamp(40px,14vmin,70px)">${item.emoji}</div>`;
            cardEl.innerHTML = `
                <div class="card-inner">
                    <div class="card-back"></div>
                    <div class="card-front">
                        <div class="match-badge">&#10004;</div>
                        ${frontContent}
                        <div class="card-name">${item.name}</div>
                    </div>
                </div>`;
            cardEl.addEventListener('click', flipCard);
            boardElement.appendChild(cardEl);
        });
    }

    function flipCard() {
        if (lockBoard || this === firstCard) return;
        this.classList.add('flipped');
        if (!hasFlippedCard) { hasFlippedCard = true; firstCard = this; return; }
        secondCard = this;
        firstCard.dataset.id === secondCard.dataset.id ? disableCards() : unflipCards();
    }

    function disableCards() {
        firstCard.removeEventListener('click', flipCard); secondCard.removeEventListener('click', flipCard);
        firstCard.classList.add('matched'); secondCard.classList.add('matched');
        matchesFound++; scoreTextEl.innerText = `${matchesFound}/3`;
        resetBoard();
        if (matchesFound === 3) setTimeout(showResult, 800);
    }

    function unflipCards() {
        lockBoard = true;
        setTimeout(() => { firstCard.classList.remove('flipped'); secondCard.classList.remove('flipped'); resetBoard(); }, 1000);
    }

    function resetBoard() { [hasFlippedCard, lockBoard] = [false, false]; [firstCard, secondCard] = [null, null]; }
    function showResult() { screenResult.classList.add('active'); }
    function handleCTA() {
        var url = 'https://www.nyxcosmetics.com/';
        if (typeof mraid !== 'undefined') mraid.open(url); else window.open(url, '_blank');
    }
</script>
</body>
</html>
